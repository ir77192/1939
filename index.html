<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1939 — 대전략</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root{
  --bg:#0a0a08;--bg2:#111110;--bg3:#181815;--bg4:#1e1e19;
  --border:#252520;--border2:#353530;--border3:#454540;
  --text:#d0c490;--text2:#857850;--text3:#504838;
  --gold:#c8a84b;--gold2:#e8c86a;
  --red:#b83030;--red2:#e04040;
  --blue2:#5080c0;--green2:#50a040;--amber2:#d09030;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;-webkit-tap-highlight-color:transparent;}
body.game-active{overflow:hidden;}

#title{min-height:100vh;background:radial-gradient(ellipse at 50% 35%,#1c1408 0%,#0a0a08 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem 3rem;overflow-y:auto;}
.title-deco{width:1px;height:70px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin-bottom:2rem;}
.title-yr{font-family:'Cinzel',serif;font-size:clamp(48px,10vw,96px);font-weight:700;letter-spacing:clamp(8px,3vw,20px);color:var(--gold2);text-shadow:0 0 60px rgba(200,168,75,.3);}
.title-sub{font-family:'Cinzel',serif;font-size:clamp(8px,1.5vw,13px);letter-spacing:clamp(3px,1.5vw,8px);color:var(--text3);margin-top:.3rem;margin-bottom:2.5rem;}
.title-h2{font-size:13px;color:var(--text2);margin-bottom:1rem;letter-spacing:3px;font-family:'Cinzel',serif;}
.nation-grid{display:grid;grid-template-columns:repeat(4,176px);gap:7px;margin-bottom:2rem;}
@media(max-width:760px){.nation-grid{grid-template-columns:repeat(2,160px);}}
.ncard{border:1px solid var(--border);border-radius:3px;padding:11px;cursor:pointer;background:var(--bg2);transition:all .18s;position:relative;overflow:hidden;}
.ncard:hover{border-color:var(--border3);}
.ncard.sel{border-color:var(--gold);background:rgba(200,168,75,.06);box-shadow:0 0 0 1px var(--gold) inset,0 0 12px rgba(200,168,75,.12);}
.ncard.sel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);z-index:1;}
.ncard-flag{font-size:22px;margin-bottom:5px;}
.ncard-name{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
.ncard-focus{font-size:11px;color:var(--text2);margin-bottom:6px;font-style:italic;line-height:1.3;}
.ncard-stats{display:flex;gap:3px;flex-wrap:wrap;}
.nstat{font-size:9px;padding:1px 5px;border-radius:2px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.start-btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:5px;padding:12px 48px;background:transparent;border:1px solid var(--gold);color:var(--gold2);cursor:pointer;border-radius:2px;transition:all .2s;}
.start-btn:hover:not(:disabled){background:rgba(200,168,75,.08);}
.start-btn:disabled{opacity:.25;cursor:not-allowed;}

#game{display:none;flex-direction:column;height:100svh;height:100vh;}
.topbar{display:flex;align-items:center;gap:5px;padding:4px 10px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap;min-height:40px;}
.tb-flag{font-size:15px;}
.tb-nation{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:1px;}
.tb-date{font-size:10px;color:var(--text3);font-style:italic;}
.tb-sep{width:1px;height:12px;background:var(--border2);}
.tb-stat{font-size:10px;color:var(--text3);}
.tb-stat b{color:var(--text);font-weight:normal;}
.tb-acts{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);}
.tb-acts b{color:var(--gold2);}
.tb-dom{font-size:10px;color:var(--amber2);font-family:'Cinzel',serif;}
.turn-btn{margin-left:auto;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:5px 12px;background:transparent;border:1px solid var(--gold);color:var(--gold);cursor:pointer;border-radius:2px;transition:all .15s;white-space:nowrap;}
.turn-btn:hover{background:rgba(200,168,75,.08);}
.dom-bar{height:2px;background:var(--border);flex-basis:100%;}
.dom-fill{height:100%;background:linear-gradient(to right,#a06818,var(--gold2));transition:width .5s;}

.gamebody{display:flex;flex:1;overflow:hidden;min-height:0;}
.map-wrap{flex:1;position:relative;overflow:hidden;background:#060e18;min-width:0;}
#map-svg{width:100%;height:100%;display:block;touch-action:none;}
.loading-map{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;letter-spacing:2px;z-index:5;}

.country{stroke:#080e16;stroke-width:.3;cursor:pointer;transition:fill .2s;}
.country:hover{stroke:var(--gold2);stroke-width:.8;}
.country.player-own{stroke:rgba(200,168,75,.5);stroke-width:.6;}
.country.selected{stroke:var(--gold2);stroke-width:1.6;}
.country.adj-neutral{stroke:#4a8a2a;stroke-width:.8;stroke-dasharray:3,2;}
.country.adj-enemy{stroke:#c04040;stroke-width:.8;stroke-dasharray:3,2;}
.country.naval-target{stroke:#2898c8;stroke-width:1;stroke-dasharray:4,2;}
.ter-atk-btn.naval-btn{border:1px solid #2898c8;color:#2898c8;margin-top:4px;}
.ter-atk-btn.naval-btn:hover:not(:disabled){background:rgba(40,152,200,.1);}
.mob-atk-btn.naval-btn{border:1px solid #2898c8;color:#2898c8;background:transparent;}

/* 오른쪽 패널 — 모바일에서도 표시 (슬라이드업 방식) */
.right-panel{width:210px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
@media(max-width:640px){
  .right-panel{display:none;} /* 모바일: 패널 숨기고 모달로 대체 */
}

.panel-hdr{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);}
#ter-info{padding:8px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:155px;}
.ter-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);margin-bottom:6px;}
.ter-row{font-size:10px;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
.ter-row span{color:var(--text);}
.ter-atk-btn{width:100%;margin-top:7px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:7px 6px;border-radius:2px;cursor:pointer;transition:all .15s;background:transparent;line-height:1.4;text-align:center;}
.ter-atk-btn.war-btn{border:1px solid var(--red2);color:var(--red2);}
.ter-atk-btn.war-btn:hover:not(:disabled){background:rgba(200,64,64,.1);}
.ter-atk-btn.blitz-btn{border:1px solid var(--amber2);color:var(--amber2);margin-top:4px;}
.ter-atk-btn.blitz-btn:hover:not(:disabled){background:rgba(208,144,48,.1);}
.ter-atk-btn:disabled{opacity:.22;cursor:not-allowed;border:1px solid var(--border2);color:var(--text3);}
#log-list{flex:1;overflow-y:auto;padding:4px;}
.log-item{font-size:10px;line-height:1.4;padding:3px 5px;border-radius:2px;margin-bottom:2px;border-left:2px solid transparent;color:var(--text2);}
.log-item.war{border-left-color:var(--red2);color:#c05050;}
.log-item.won{border-left-color:var(--green2);color:#5a9a40;}
.log-item.eco{border-left-color:var(--green2);}
.log-item.diplo{border-left-color:var(--blue2);}
.log-item.tech{border-left-color:var(--amber2);}
.log-item.event{border-left-color:var(--gold);color:var(--gold);}
.log-item.ai{border-left-color:var(--red);color:#904040;}

.bottom{display:flex;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;height:155px;}
@media(max-width:580px){.bottom{height:auto;flex-direction:column;max-height:50vh;overflow-y:auto;}}
.stat-panel{width:162px;border-right:1px solid var(--border);padding:8px;flex-shrink:0;}
@media(max-width:580px){.stat-panel{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:5px 10px;display:flex;flex-wrap:wrap;gap:2px 10px;}}
.stat-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
@media(max-width:580px){.stat-row{flex:1 1 44%;min-width:110px;margin-bottom:0;}}
.stat-label{font-size:10px;color:var(--text3);width:42px;flex-shrink:0;}
.stat-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;transition:width .35s;}
.stat-val{font-size:10px;color:var(--text);width:24px;text-align:right;}
.stat-extra{margin-top:5px;font-size:9px;color:var(--text3);line-height:1.7;}
.action-panel{flex:1;padding:6px 8px;overflow-x:auto;min-width:0;}
.action-grid{display:flex;gap:5px;height:100%;align-items:flex-start;padding-bottom:2px;}
.act-btn{border:1px solid var(--border);border-radius:3px;padding:6px 8px;background:var(--bg3);cursor:pointer;text-align:left;min-width:100px;max-width:122px;transition:all .15s;color:var(--text);flex-shrink:0;position:relative;}
.act-btn:hover:not(:disabled){border-color:var(--border3);background:var(--bg4);}
.act-btn:disabled,.act-btn.used{opacity:.28;cursor:not-allowed;}
.act-btn.used{border-style:dashed;}
.act-icon{font-size:13px;margin-bottom:2px;}
.act-name{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;display:block;margin-bottom:2px;}
.act-cost{font-size:9px;color:var(--text3);display:block;margin-bottom:2px;}
.act-desc{font-size:9px;color:var(--text2);line-height:1.3;}
.act-used-lbl{position:absolute;top:3px;right:4px;font-size:8px;color:var(--text3);}

/* ── 모바일 영토 정보 모달 ── */
#mob-ter-modal{
  position:fixed;inset:0;z-index:180;
  background:rgba(0,0,0,.82);
  display:none;align-items:flex-end;justify-content:center;
  padding:0;
}
#mob-ter-modal.show{display:flex;}
.mob-ter-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:6px 6px 0 0;
  width:100%;max-width:500px;
  padding:16px 18px 28px;
  max-height:70vh;overflow-y:auto;
}
.mob-ter-close{
  float:right;background:none;border:none;color:var(--text3);font-size:18px;
  cursor:pointer;padding:0 4px;line-height:1;
}
/* 모바일 전쟁 버튼 — 터치 영역 크게 */
.mob-atk-btn{
  display:block;width:100%;margin-top:10px;
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;
  padding:14px 10px;border-radius:4px;cursor:pointer;
  line-height:1.4;text-align:center;
  /* 터치 피드백 */
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.mob-atk-btn.war-btn{border:1px solid var(--red2);color:var(--red2);background:transparent;}
.mob-atk-btn.blitz-btn{border:1px solid var(--amber2);color:var(--amber2);background:transparent;}
.mob-atk-btn:disabled{opacity:.25;cursor:not-allowed;border:1px solid var(--border2);color:var(--text3);}
.mob-atk-btn:not(:disabled):active{opacity:.7;}

/* BATTLE OVERLAY */
#battle-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:1rem;}
#battle-overlay.show{display:flex;}
.battle-box{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;max-width:500px;width:100%;max-height:92vh;overflow-y:auto;}
.battle-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);}
.battle-title{font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);letter-spacing:2px;}
.battle-subtitle{font-size:11px;color:var(--text3);margin-top:3px;}
.battle-body{padding:14px 18px;}

.battle-vs{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.battle-side{flex:1;background:var(--bg3);border-radius:3px;padding:10px;text-align:center;}
.battle-side.atk{border:1px solid rgba(200,168,75,.25);}
.battle-side.def{border:1px solid rgba(224,64,64,.25);}
.bs-flag{font-size:22px;margin-bottom:4px;}
.bs-name{font-family:'Cinzel',serif;font-size:9px;color:var(--text2);margin-bottom:6px;letter-spacing:1px;}
.bs-pow{font-family:'Cinzel',serif;font-size:26px;font-weight:700;}
.bs-pow.a{color:var(--gold2);}
.bs-pow.d{color:var(--red2);}
.bs-sub{font-size:9px;color:var(--text3);margin-top:4px;line-height:1.5;}
.bvs{font-family:'Cinzel',serif;font-size:18px;color:var(--text3);}

.bbar-wrap{margin-bottom:10px;}
.bbar-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:3px;}
.bbar-track{height:7px;background:var(--border);border-radius:3px;overflow:hidden;display:flex;}
.bbar-a{background:linear-gradient(to right,var(--gold),var(--amber2));height:100%;transition:width .5s;}
.bbar-d{background:linear-gradient(to right,var(--red2),var(--red));height:100%;transition:width .5s;}

.phase-title{font-family:'Cinzel',serif;font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.battle-log{background:var(--bg3);border-radius:3px;padding:8px 10px;font-size:10px;color:var(--text2);line-height:1.85;max-height:150px;overflow-y:auto;border:1px solid var(--border);}
.bl{margin-bottom:1px;}
.bl.g{color:#50a040;}
.bl.b{color:#d05050;}
.bl.n{color:var(--text3);}
.bl.r{color:var(--gold2);font-family:'Cinzel',serif;font-size:11px;margin-top:5px;}

.battle-result{margin-top:12px;padding:10px 12px;border-radius:3px;text-align:center;}
.battle-result.v{background:rgba(40,90,30,.2);border:1px solid rgba(60,150,40,.3);}
.battle-result.f{background:rgba(160,40,40,.15);border:1px solid rgba(210,50,50,.25);}
.br-ttl{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;margin-bottom:5px;}
.br-ttl.v{color:var(--green2);}
.br-ttl.f{color:var(--red2);}
.br-det{font-size:10px;color:var(--text2);line-height:1.8;}
.battle-close{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:8px 24px;border-radius:2px;cursor:pointer;background:transparent;border:1px solid var(--gold);color:var(--gold);margin-top:12px;display:block;width:100%;transition:all .15s;touch-action:manipulation;}
.battle-close:hover{background:rgba(200,168,75,.08);}

#modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;padding:1rem;}
#modal.show{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:18px 20px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);letter-spacing:2px;margin-bottom:8px;}
.modal-body{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.modal-btns{display:flex;gap:7px;flex-wrap:wrap;}
.mbtn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:7px 14px;border-radius:2px;cursor:pointer;transition:all .15s;background:transparent;min-height:33px;touch-action:manipulation;}
.mbtn-gold{border:1px solid var(--gold);color:var(--gold);}
.mbtn-gold:hover{background:rgba(200,168,75,.08);}
.mbtn-gray{border:1px solid var(--border2);color:var(--text2);}
.mbtn-gray:hover{background:var(--bg3);}

#end-screen{display:none;position:fixed;inset:0;z-index:150;background:radial-gradient(ellipse at 50% 40%,#1a1508 0%,#0a0a08 80%);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1rem;overflow-y:auto;}
.end-title{font-family:'Cinzel',serif;font-size:clamp(20px,5vw,32px);font-weight:700;color:var(--gold2);letter-spacing:6px;margin-bottom:.4rem;}
.end-sub{font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:1.5rem;}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1.5rem;width:min(370px,90vw);}
.score-box{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px;}
.score-box .sl{font-size:9px;color:var(--text3);margin-bottom:3px;}
.score-box .sv{font-size:20px;color:var(--text);}
.final-score{font-family:'Cinzel',serif;font-size:clamp(28px,6vw,44px);color:var(--gold2);margin-bottom:.2rem;}
.final-rank{font-size:11px;color:var(--text2);letter-spacing:3px;margin-bottom:1.5rem;}

#tooltip{position:fixed;z-index:250;background:var(--bg2);border:1px solid var(--border2);border-radius:3px;padding:5px 9px;font-size:11px;pointer-events:none;display:none;max-width:180px;line-height:1.6;}
#tooltip b{color:var(--gold);font-family:'Cinzel',serif;font-size:10px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div id="title">
  <div class="title-deco"></div>
  <div class="title-yr">1939</div>
  <div class="title-sub">WORLD WAR II — GRAND STRATEGY</div>
  <div class="title-h2">국가 선택</div>
  <div class="nation-grid" id="nation-grid"></div>
  <button class="start-btn" id="start-btn" disabled onclick="startGame()">전쟁 개시</button>
</div>

<div id="game">
  <div class="topbar">
    <span class="tb-flag" id="hud-flag"></span>
    <span class="tb-nation" id="hud-nation"></span>
    <span class="tb-date" id="hud-date"></span>
    <div class="tb-sep"></div>
    <span class="tb-stat">군 <b id="hud-mil"></b></span>
    <span class="tb-stat">경 <b id="hud-eco"></b></span>
    <span class="tb-stat">정 <b id="hud-pol"></b></span>
    <span class="tb-stat">연 <b id="hud-res"></b></span>
    <span class="tb-stat">영 <b id="hud-ter"></b></span>
    <span class="tb-stat">해 <b id="hud-navy" style="color:#2898c8">0</b></span>
    <span class="tb-acts">행동 <b id="hud-acts">0</b>/3</span>
    <span class="tb-dom" id="hud-dom">🌍 0%</span>
    <button class="turn-btn" onclick="nextTurn()">다음 턴 ▶</button>
    <div class="dom-bar"><div class="dom-fill" id="dom-fill" style="width:0%"></div></div>
  </div>

  <div class="gamebody">
    <div class="map-wrap" id="map-wrap">
      <div class="loading-map" id="map-loading">지도 불러오는 중...</div>
      <svg id="map-svg"></svg>
    </div>
    <div class="right-panel">
      <div class="panel-hdr">영토 정보</div>
      <div id="ter-info"><div style="font-size:10px;color:var(--text3);padding:4px">
        지도에서 국가를 클릭하세요.<br><br>
        <span style="color:#4a8a2a">◆ 초록 점선</span> = 공략 가능<br>
        <span style="color:#c04040">◆ 빨간 점선</span> = 적국 인접<br>
        <span style="color:#2898c8">◆ 파란 점선</span> = 상륙 가능<br>
        <br><span style="color:var(--text3)">해군 30 이상이면 상륙작전 가능</span>
      </div></div>
      <div class="panel-hdr" style="border-top:1px solid var(--border)">전황 일지</div>
      <div id="log-list"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="stat-panel">

  const landAdj=getAdj(); // 육상 인접은 제외
  const targets=new Set();
  Object.entries(own).forEach(([iso,owner])=>{
    if(owner===G.nid)return;
    if(!COASTAL.has(iso))return;
    if(landAdj.has(iso))return; // 육상 인접은 일반 전쟁으로
    if(myCoastal.some(mc=>isNavalAdjacent(mc,iso)))targets.add(iso);
  });
  return targets;
}

let G={},own={},geoData=null,selNid=null;
let msvg,proj,pg,mG,mZoom;

// 모바일 감지
const isMobile=()=>window.innerWidth<=640;

function initState(nid){
  const n=NATIONS.find(x=>x.id===nid);
  G={
    nid,nation:n,turn:1,year:1939,month:9,
    navy:Math.min(100,5+(n.bonus.mil>20?8:0)+(n.bonus.eco>20?5:0)),
    mil:30+n.bonus.mil,eco:Math.min(100,30+n.bonus.eco),
    pol:Math.min(100,30+n.bonus.pol),res:Math.min(100,20+n.bonus.res),
    techs:n.techs.map(t=>({...t})),
    logs:[],selISO:null,actsUsed:0,actsUsedSet:new Set(),
    factQ:[],permEco:0,factCount:0,warCount:0,victories:0,
    _25:false,_50:false,_75:false,_invasionQ:[],
  };
  own={};
  Object.entries(OWNER_1939).forEach(([k,v])=>own[k]=v);
}

const getISO=id=>N2I[parseInt(id)]||null;
const ownerOf=iso=>iso?(own[iso]||'neutral'):'neutral';
const playerTer=()=>Object.values(own).filter(v=>v===G.nid).length;
const totalTer=()=>Object.keys(own).length;
const domPct=()=>Math.round(playerTer()/totalTer()*100);

function getAdj(){
  const mine=new Set(Object.entries(own).filter(([,v])=>v===G.nid).map(([k])=>k));
  const adj=new Set();
  mine.forEach(iso=>{(ADJ[iso]||[]).forEach(n=>{if(!mine.has(n))adj.add(n);});});
  return adj;
}

// MAP
// ══════════════════════════════════
async function initMap(){
  const wrap=document.getElementById('map-wrap');
  const w=wrap.clientWidth||window.innerWidth;
  const h=wrap.clientHeight||Math.floor(window.innerHeight*.5);
  msvg=d3.select('#map-svg').attr('width',w).attr('height',h);
  proj=d3.geoNaturalEarth1().scale(w/6.3).translate([w/2,h/2]);
  pg=d3.geoPath().projection(proj);
  msvg.append('rect').attr('width',w).attr('height',h).attr('fill','#060e18');
  const grat=d3.geoGraticule().step([20,20]);
  msvg.append('path').datum(grat()).attr('d',pg).attr('fill','none').attr('stroke','#0a1820').attr('stroke-width',.35);
  mG=msvg.append('g');
  mZoom=d3.zoom().scaleExtent([.8,14]).on('zoom',e=>mG.attr('transform',e.transform));
  msvg.call(mZoom);
  try{
    const topo=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    geoData=topojson.feature(topo,topo.objects.countries);
    document.getElementById('map-loading').style.display='none';
    drawMap();drawLegend();
  }catch(e){document.getElementById('map-loading').textContent='지도 로드 실패 — 새로고침';}
}

function drawMap(){
  if(!geoData)return;
  const adj=getAdj();
  const navalTargets=getNavalTargets();
  mG.selectAll('.country').remove();
  mG.selectAll('.country')
    .data(geoData.features).enter().append('path')
    .attr('class',d=>{
      const iso=getISO(d.id),o=ownerOf(iso);
      let c='country';
      if(o===G.nid)c+=' player-own';
      if(iso===G.selISO)c+=' selected';
      else if(iso&&adj.has(iso)){c+=o==='neutral'?' adj-neutral':o!==G.nid?' adj-enemy':'';}
      else if(iso&&navalTargets.has(iso)){c+=' naval-target';}
      return c;
    })
    .attr('d',pg)
    .attr('fill',d=>COLORS[ownerOf(getISO(d.id))]||COLORS.neutral)
    .on('mouseover',function(ev,d){
      // 마우스만 (터치 제외)
      if(ev.type==='mouseover'){
        const iso=getISO(d.id),o=ownerOf(iso);
        if(iso!==G.selISO)d3.select(this).attr('fill',HOVERS[o]||HOVERS.neutral);
        tipShow(ev,iso,o,adj.has(iso));
      }
    })
    .on('mousemove',ev=>{if(ev.type==='mousemove')tipMove(ev);})
    .on('mouseout',function(ev,d){
      if(ev.type==='mouseout'){
        const iso=getISO(d.id),o=ownerOf(iso);
        if(iso!==G.selISO)d3.select(this).attr('fill',COLORS[o]||COLORS.neutral);
        tipHide();
      }
    })
    // 클릭/터치 통합 핸들러
    .on('click',handleMapClick)
    .on('touchstart',function(ev){
      const t=ev.touches[0];
      this._ts={x:t.clientX,y:t.clientY};
    })
    .on('touchend',function(ev,d){
      const t=ev.changedTouches[0];
      const ts=this._ts||{x:t.clientX,y:t.clientY};
      const dx=Math.abs(t.clientX-ts.x),dy=Math.abs(t.clientY-ts.y);
      if(dx>8||dy>8)return; // 슬라이드/줌이면 무시
      ev.preventDefault();
      ev.stopPropagation();
      handleMapClick.call(this,ev,d);
    });
}

function handleMapClick(ev,d){
  tipHide();
  const iso=getISO(d.id);
  if(!iso)return;
  G.selISO=iso;
  drawMap();
  renderTerInfo(iso);
  // 모바일: 슬라이드업 모달 표시
  if(isMobile()){
    renderMobTerModal(iso);
  }
}

function drawLegend(){
  msvg.select('.ml').remove();
  const lg=msvg.append('g').attr('class','ml').attr('transform','translate(8,8)');
  const E=[{id:'germany',n:'독일'},{id:'uk',n:'영국'},{id:'ussr',n:'소련'},{id:'usa',n:'미국'},{id:'japan',n:'일본'},{id:'france',n:'프랑스'},{id:'italy',n:'이탈리아'},{id:'china',n:'중국'},{id:'neutral',n:'중립'}];
  // 범례 하단에 상륙 가이드 추가는 별도 처리
  const legH=12+E.length*14+36;
  lg.append('rect').attr('width',100).attr('height',legH).attr('rx',3).attr('fill','rgba(6,14,24,.92)').attr('stroke','#141e28').attr('stroke-width',.5);
  lg.append('text').attr('x',50).attr('y',11).attr('text-anchor','middle').attr('font-size',7).attr('fill','#3a4858').attr('font-family','sans-serif').text('세력 판도');
  E.forEach((e,i)=>{
    const y=18+i*14;
    lg.append('rect').attr('x',8).attr('y',y-4).attr('width',8).attr('height',7).attr('rx',1).attr('fill',COLORS[e.id]);
    lg.append('text').attr('x',21).attr('y',y+2).attr('font-size',8).attr('fill','#a8a090').attr('font-family','sans-serif').text(e.n);
  });
  // 상륙 범례
  const navalY=18+E.length*14+4;
  lg.append('line').attr('x1',8).attr('y1',navalY-1).attr('x2',16).attr('y2',navalY-1).attr('stroke','#2898c8').attr('stroke-width',1.2).attr('stroke-dasharray','3,2');
  lg.append('text').attr('x',21).attr('y',navalY+2).attr('font-size',8).attr('fill','#2898c8').attr('font-family','sans-serif').text('⚓상륙 가능');
  const oilY=navalY+14;
  lg.append('text').attr('x',8).attr('y',oilY+2).attr('font-size',9).attr('fill','#d09030').attr('font-family','sans-serif').text('🛢유전지역');
}

function tipShow(ev,iso,o,isAdj){
  const name=I2N[iso]||iso||'?';
  const flag=NFLAGS[o]||'';
  const on=NNAMES[o]||o;
  const adj2=isAdj&&o!==G.nid?`<br><span style="color:#4a8a2a">◆ 클릭 → 공략 가능</span>`:'';
  const navalT=getNavalTargets();
  const adj3=(!isAdj&&navalT.has(iso)&&o!==G.nid)?`<br><span style="color:#2898c8">⚓ 클릭 → 상륙 가능</span>`:'';
  document.getElementById('tooltip').innerHTML=`<b>${name}</b><br>${flag} ${on}${adj2}${adj3}`;
  document.getElementById('tooltip').style.display='block';
  tipMove(ev);
}
function tipMove(ev){
  const t=document.getElementById('tooltip');
  const x=ev.clientX||(ev.touches?.[0]?.clientX)||0;
  const y=ev.clientY||(ev.touches?.[0]?.clientY)||0;
  t.style.left=(x+14)+'px';t.style.top=(y-8)+'px';
}
function tipHide(){document.getElementById('tooltip').style.display='none';}

function renderHUD(){
  const mo=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('hud-flag').textContent=G.nation.flag;
  document.getElementById('hud-nation').textContent=G.nation.name;
  document.getElementById('hud-date').textContent=`${G.year}년 ${mo[G.month-1]}`;
  ['mil','eco','pol','res'].forEach(k=>document.getElementById('hud-'+k).textContent=G[k]);
  document.getElementById('hud-navy').textContent=G.navy||0;

  const navyStatusEl=document.getElementById('navy-status');
  if(navySt)navySt.textContent=G.navy||0;
  if(navyStatusEl){
    const nv=G.navy||0;
    navyStatusEl.textContent=nv>=80?'⚓ 무적함대':nv>=50?'⚓ 강력한 함대':nv>=30?'⚓ 상륙 가능':nv>=10?'건설 중...':'— 없음';

function renderBars(){
  [['mil','var(--red2)'],['eco','var(--green2)'],['pol','var(--blue2)'],['res','var(--amber2)'],['navy','#2898c8']].forEach(([k,c])=>{
    // mil/navy는 상한 없으므로 바는 100 기준으로 캡핑해서 표시
    const pct=UNCAPPED.has(k)?Math.min(100,G[k]):G[k];
    document.getElementById('bar-'+k).style.cssText=`width:${pct}%;background:${c}`;
    document.getElementById('bv-'+k).textContent=G[k]; // 실제 수치 표시
  });
}

// TERRITORY INFO — 공통 HTML 빌더
// ══════════════════════════════════
function buildTerHTML(iso, isMob){
  const o=ownerOf(iso);
  const name=I2N[iso]||iso;
  const flag=NFLAGS[o]||'';
  const oName=NNAMES[o]||o;
  const adj=getAdj();
  const isAdj=adj.has(iso);
  const isOwn=o===G.nid;

  const defPow=calcDefPower(iso,o);
  const atkPow=G.mil;
  const winPct=Math.round(calcWinRate(atkPow,defPow)*100);
  const blitzPct=Math.min(95,Math.round(calcWinRate(atkPow+15,defPow)*100));

  const atkUsed=G.actsUsedSet.has('atk');
  const navalTargets=getNavalTargets();
  const isNaval=navalTargets.has(iso);
  const canAtk=!isOwn&&isAdj&&G.actsUsed<3&&!atkUsed&&G.mil>=15&&G.eco>=8;
  const canBlitz=!isOwn&&isAdj&&G.actsUsed<3&&!atkUsed&&G.mil>=35&&G.eco>=14;
  const canNaval=!isOwn&&isNaval&&G.actsUsed<3&&!atkUsed&&G.navy>=30&&G.mil>=20&&G.eco>=12;

  let atkReason='',blitzReason='',navalReason='';
  if(!isAdj){atkReason='인접하지 않음';blitzReason='인접하지 않음';}
  else if(G.actsUsed>=3){atkReason='행동력 소진';blitzReason='행동력 소진';}
  else if(atkUsed){atkReason='이번 턴 전쟁 완료';blitzReason='이번 턴 전쟁 완료';}
  else{
    if(G.mil<15)atkReason='군사력 15 필요';
    else if(G.eco<8)atkReason='경제력 8 필요';
    if(G.mil<35)blitzReason='군사력 35 필요';
    else if(G.eco<14)blitzReason='경제력 14 필요';
  }
  if(!isNaval&&!isAdj){navalReason='해상 접근 불가';}
  else if(isAdj){navalReason='육상 인접(일반전쟁 사용)';}
  else if(G.actsUsed>=3){navalReason='행동력 소진';}
  else if(atkUsed){navalReason='이번 턴 전쟁 완료';}
  else if(G.navy<30){navalReason=`해군력 30 필요 (현재 ${G.navy})`;}
  else if(G.mil<20){navalReason='군사력 20 필요';}
  else if(G.eco<12){navalReason='경제력 12 필요';}

  const navalWinPct=Math.round(calcWinRate(G.mil+(G.navy*0.4|0)-10,defPow)*100);

  const btnClass=isMob?'mob-atk-btn':'ter-atk-btn';

  const oilInfo=OIL_REGIONS[iso];
  return `
    <div class="ter-name">${flag} ${name}${oilInfo?` <span style="color:#d09030;font-size:9px">🛢 유전</span>`:''}</div>
    <div class="ter-row">지배<span>${oName}</span></div>
    <div class="ter-row">상태<span style="color:${isOwn?'var(--gold2)':isAdj?'#c04040':'var(--text3)'}">${isOwn?'🟡 아군':isAdj?'⚠ 인접':'○ 원거리'}</span></div>
    ${oilInfo&&!isOwn?`<div class="ter-row" style="color:#d09030">🛢 ${oilInfo.label}<span>경제 +${oilInfo.eco}</span></div>`:''}
    ${!isOwn?`
    <div class="ter-row">방어력<span style="color:var(--red2)">${defPow}</span></div>
    <div class="ter-row">내 군사력<span style="color:var(--gold)">${atkPow}</span></div>
    <button class="${btnClass} war-btn" ${!canAtk?'disabled':''} onclick="startBattle('${iso}','normal')">
      ⚔ 전쟁 선포 — 군-12 경-8<br>
      <span style="font-size:${isMob?'11':'9'}px">${canAtk?`승리 확률 ${winPct}%`:atkReason}</span>
    </button>
    <button class="${btnClass} blitz-btn" ${!canBlitz?'disabled':''} onclick="startBattle('${iso}','blitz')">
      ⚡ 전격전 — 군-22 경-14<br>
      <span style="font-size:${isMob?'11':'9'}px">${canBlitz?`승리 확률 ${blitzPct}%`:blitzReason}</span>
    </button>
    ${isNaval?`<button class="${btnClass} naval-btn" ${!canNaval?'disabled':''} onclick="startBattle('${iso}','naval')">
      ⚓ 상륙작전 — 해군-15 군-20 경-12<br>
      <span style="font-size:${isMob?'11':'9'}px">${canNaval?`승리 확률 ${navalWinPct}% (해군 보정 포함)`:navalReason}</span>
    </button>`:''}
    `:'<div style="font-size:10px;color:var(--text3);margin-top:6px">아군 영토</div>'}`;
}

function renderTerInfo(iso){

// 방어력 캐시 — 같은 턴 내에서 iso별로 고정값 유지
const _defCache={};
function calcDefPower(iso,o){
  const key=`${G.turn}_${iso}`;
  if(_defCache[key]!==undefined)return _defCache[key];
  const BASE={germany:72,uk:62,ussr:78,usa:68,japan:66,france:56,italy:50,china:44,neutral:38};
  const base=BASE[o]||38;
  const terCount=Object.values(own).filter(v=>v===o).length;
  // 중립국: 주변 아군 영토가 많을수록 저항 강화 (고립 저항)
  let neutralBonus=0;
  if(o==='neutral'){
    const adjCount=(ADJ[iso]||[]).filter(a=>own[a]===G.nid).length;
    neutralBonus=adjCount*6; // 포위될수록 결사 저항
  }
  const val=Math.round(base+terCount*0.8+neutralBonus+Math.random()*10);
  _defCache[key]=val;
  return val;
}
function calcWinRate(atk,def){
  const ratio=atk/(def||1);
  return Math.min(0.95,Math.max(0.07,1/(1+Math.exp(-2.8*(ratio-1)))));
}

function startBattle(iso,mode){
  // 모바일 모달 닫기
  closeMobTer();

  const o=ownerOf(iso);
  if(o===G.nid)return;
  const adj=getAdj();
  if(!adj.has(iso))return;
  const isBlitz=mode==='blitz';
  const isNaval=mode==='naval';
  const milCost=isBlitz?22:isNaval?20:12;
  const ecoCost=isBlitz?14:isNaval?12:8;
  const navyCost=isNaval?15:0;
  if(G.mil<milCost||G.eco<ecoCost)return;
  if(isNaval&&G.navy<30)return;
  if(G.actsUsed>=3)return;
  if(G.actsUsedSet.has('atk'))return; // 턴당 전쟁 1회 제한
  // 상륙작전은 해상 인접이어야 함, 일반/전격전은 육상 인접
  if(isNaval){const nt=getNavalTargets();if(!nt.has(iso))return;}
  else if(!adj.has(iso))return;

  const name=I2N[iso]||iso;
  const oName=NNAMES[o]||o;
  const defPow=calcDefPower(iso,o);
  // 상륙 보정: 해군력의 40%를 공격력에 추가, 하지만 방어측 +10 보너스(해안 방어)
  const navalBonus=isNaval?Math.floor(G.navy*0.4):0;
  const atkBase=G.mil+(isBlitz?15:0)+navalBonus;
  const defBonus=isNaval?10:0;

  G.mil=Math.max(0,G.mil-milCost);
  G.eco=Math.max(0,G.eco-ecoCost);
  if(isNaval)G.navy=Math.max(0,G.navy-navyCost);
  G.warCount++;

  const result=simulateBattle(atkBase,defPow+defBonus,isNaval?'naval':isBlitz?'blitz':'normal',name,oName);

  if(result.won){
    own[iso]=G.nid;G.victories++;
    G.mil=Math.max(0,G.mil-result.atkLoss);
    const logPrefix=isNaval?'⚓':'🏆';
    addLog(`${logPrefix} ${name} ${isNaval?'상륙 성공':'점령'}! (${result.turns}라운드, 피해 군${result.atkLoss})`,'won');
    // 중립국 점령 시 국제 비난 — 정치력 손실
    if(o==='neutral'){G.pol=Math.max(0,G.pol-8);addLog(`중립국 침략으로 정치력 -8 (국제 비난)`);}
    // 석유 지역 보너스
    const oilBonus=OIL_REGIONS[iso];
    if(oilBonus){G.eco=Math.min(100,G.eco+oilBonus.eco);G.res=Math.min(100,G.res+oilBonus.res);addLog(`🛢 ${name} 유전 확보! 경제 +${oilBonus.eco}, 연구 +${oilBonus.res}`,'eco');}
    checkDom();
  } else {
    G.mil=Math.max(0,G.mil-result.atkLoss);
    const failPrefix=isNaval?'🌊':'💀';
    addLog(`${failPrefix} ${name} ${isNaval?'상륙 실패':'공략 실패'}. 피해 군${result.atkLoss}`,'war');
    if(o==='neutral'){G.pol=Math.max(0,G.pol-3);addLog(`중립국 침략 실패 — 정치력 -3`);}
  }

  G.actsUsed++;
  G.actsUsedSet.add('atk'); // war/blitz 구분 없이 atk 하나로

  showBattleUI(iso,name,oName,o,isBlitz,isNaval,navalBonus,atkBase,defPow+defBonus,result);
  renderAll();
  renderTerInfo(iso);
}

function simulateBattle(atkPow,defPow,mode,atkName,defName){
  const isBlitz=mode==='blitz';
  const isNaval=mode==='naval';
  const lines=[];
  let atk=atkPow,def=defPow;
  let atkTot=0,defTot=0;
  const maxR=isBlitz?4:isNaval?5:7;
  const atkTactics=isNaval
    ?['함포 지원 사격','상륙정 돌격','해병대 투입','항공 모함 공습','교두보 확보','기습 상륙','해안 포격']
    :['전차 돌격','포병 집중 사격','항공 폭격','보병 돌격','측면 우회 기동','화력 집중','공수부대 투입'];
  const defTactics=isNaval
    ?['해안 포대 반격','기뢰 저지선','예비대 반격','참호 방어','해안 방어선 사수','대전차 포격','격렬한 저항']
    :['방어선 구축','반격 실시','저격수 교란','지뢰 매설','예비대 투입','진지 사수','포병 방어'];
  let r;
  for(r=1;r<=maxR;r++){
    const ar=Math.floor(atk*(0.28+Math.random()*0.44));
    const dr=Math.floor(def*(0.25+Math.random()*0.42));
    atkTot+=ar;defTot+=dr;
    const at=atkTactics[Math.floor(Math.random()*atkTactics.length)];
    const dt=defTactics[Math.floor(Math.random()*defTactics.length)];
    if(ar>dr){
      const dmg=Math.floor((ar-dr)*0.55+1);
      def=Math.max(0,def-dmg);
      lines.push({t:`R${r}`,msg:`[${at}] → 적 피해 ${dmg}. (${ar}↑ vs ${dr})`,c:'g'});
    } else if(dr>ar){
      const dmg=Math.floor((dr-ar)*0.48+1);
      atk=Math.max(0,atk-dmg);
      lines.push({t:`R${r}`,msg:`적 [${dt}] → 아군 피해 ${dmg}. (${ar} vs ${dr}↑)`,c:'b'});
    } else {
      lines.push({t:`R${r}`,msg:`교착 상태. (${ar} vs ${dr})`,c:'n'});
    }
    if(def<=0||atk<=0)break;
  }
  const won=atk>def||(r>maxR&&atkTot>defTot);
  const atkLoss=Math.max(2,Math.floor((atkPow-atk)*0.45+2+Math.random()*5));
  return {won,turns:r,lines,atkTot,defTot,atkLoss,atkFinal:atk,defFinal:def};
}

  if(G.actsUsed>=3||G.actsUsedSet.has(a.id))return false;
  return Object.entries(a.needs||{}).every(([k,v])=>G[k]>=v);
}
function renderActs(){

  ACTS.forEach(a=>{
    const can=canAct(a),used=G.actsUsedSet.has(a.id);
    const btn=document.createElement('button');
    btn.className='act-btn'+(used?' used':'');btn.disabled=!can;

function nextTurn(){
  const still=[];
  G.factQ.forEach(f=>{
    if(G.turn>=f.readyTurn){G.permEco+=f.inc;addLog(`공장 완공! +${f.inc}경/턴`,'eco');}
    else still.push(f);
  });
  G.factQ=still;
  const ter=playerTer();
  G.eco=Math.min(100,G.eco+2+Math.floor(ter*0.6)+G.permEco);
  G.mil=G.mil+1+Math.floor(ter*0.2);
  G.pol=Math.min(100,G.pol+1);G.res=Math.min(100,G.res+1);
  if(G.nid==='usa')G.eco=Math.min(100,G.eco+3);
  if(G.nid==='ussr')G.mil=G.mil+2;
  if(G.nid==='uk')G.pol=Math.min(100,G.pol+2);
  if(G.nid==='germany'&&ter>4)G.mil=G.mil+2;
  if(G.nid==='uk'||G.nid==='japan')G.navy=Math.min(100,(G.navy||0)+2); // 해양 국가 보너스
  // 연안 영토 보유에 따른 해군 유지 (소폭 감쇠 + 연안 영토 보너스)
  const myCoastalCount=Object.entries(own).filter(([k,v])=>v===G.nid&&(typeof COASTAL!=='undefined'&&COASTAL.has(k))).length;
  if(myCoastalCount>0)G.navy=Math.min(100,(G.navy||0)+Math.floor(myCoastalCount*0.3));
  aiExpand();
  G.turn++;G.month+=3;if(G.month>12){G.month-=12;G.year++;}
  G.actsUsed=0;G.actsUsedSet=new Set();
  addLog(`${G.year}년 ${G.month}월 — 영토 ${ter}국, 공장 +${G.permEco}/턴`,'');
  renderAll();renderTerInfo(G.selISO);
  // 침략 알림 처리 (순차 표시)
  if(G._invasionQ&&G._invasionQ.length){
    processInvasionQueue();
  }
}

function processInvasionQueue(){
  if(!G._invasionQ||!G._invasionQ.length)return;
  const inv=G._invasionQ.shift();
  // 이미 빼앗겼으면 스킵
  if(own[inv.iso]!==G.nid){processInvasionQueue();return;}
  showInvasionAlert(inv);
}

      } else {
        own[inv.iso]=inv.nid;
        addLog(`💀 ${inv.tName} 함락! ${inv.nn}에게 빼앗겼다. 군사력 감소`,'ai');
        G.mil=Math.max(0,G.mil-Math.floor(inv.atkPow*0.25));
      }
      renderAll();renderTerInfo(G.selISO);
      // 다음 알림
      setTimeout(()=>processInvasionQueue(),400);
    }},
    {label:'🚩 포기 — 영토 양도',cls:'mbtn-gray',fn(){
      own[inv.iso]=inv.nid;
      addLog(`🚩 ${inv.tName} 포기. ${inv.nn}에 양도. 정치력 -5`,'ai');
      G.pol=Math.max(0,G.pol-5);
      renderAll();renderTerInfo(G.selISO);
      setTimeout(()=>processInvasionQueue(),400);
    }},
  ]);
}

function aiExpand(){
  ['germany','uk','ussr','usa','japan','france','italy','china'].filter(n=>n!==G.nid).forEach(nid=>{
    const nt=Object.entries(own).filter(([,v])=>v===nid).length;
    for(let i=0;i<1+Math.floor(nt/10);i++){
      if(Math.random()<0.13){
        const pool=Object.entries(own).filter(([k,v])=>v==='neutral'&&I2N[k]).map(([k])=>k);
        if(pool.length)own[pool[Math.floor(Math.random()*pool.length)]]=nid;
      }
    }
    if(Math.random()<0.032&&nt>5){
      const my=Object.entries(own).filter(([,v])=>v===G.nid).map(([k])=>k);
      // 인접한 내 영토만 침략 대상
      const adjToEnemy=my.filter(iso=>(ADJ[iso]||[]).some(a=>own[a]===nid));
      const target=adjToEnemy.length?adjToEnemy[Math.floor(Math.random()*adjToEnemy.length)]:null;
      if(target&&Math.random()<0.3){
        const tName=I2N[target]||target;
        const nn={germany:'독일',uk:'영국',ussr:'소련',usa:'미국',japan:'일본',france:'프랑스',italy:'이탈리아',china:'중국'}[nid]||nid;
        const nFlag={germany:'🇩🇪',uk:'🇬🇧',ussr:'🇷🇺',usa:'🇺🇸',japan:'🇯🇵',france:'🇫🇷',italy:'🇮🇹',china:'🇨🇳'}[nid]||'🏳';
        // 방어력 계산
        const defPow=G.mil;
        const atkPow=Math.round(60+nt*1.2+Math.random()*15);
        const defWin=calcWinRate(defPow,atkPow);
        // 방어 알림 큐에 추가
        G._invasionQ=G._invasionQ||[];
        G._invasionQ.push({iso:target,tName,nid,nn,nFlag,atkPow,defPow,defWin:Math.round(defWin*100)});
      }
    }
  });
}

// ══════════════════════════════════
// MODAL / LOG / UTIL
// ══════════════════════════════════
function showModal(title,body,btns){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  const bb=document.getElementById('modal-btns');bb.innerHTML='';
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.className=`mbtn ${b.cls}`;btn.textContent=b.label;
    btn.addEventListener('click',()=>{closeModal();b.fn&&b.fn();});
    bb.appendChild(btn);
  });
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

// mil/navy는 상한 없음, 나머지는 100 상한
const UNCAPPED=new Set(['mil','navy']);
function applyEff(e){
  Object.entries(e).forEach(([k,v])=>{
    if(G[k]!==undefined){
      G[k]=UNCAPPED.has(k)?Math.max(0,G[k]+v):Math.min(100,Math.max(0,G[k]+v));
    }
  });
}
function addLog(text,type=''){
  G.logs.unshift({text,type,turn:G.turn,year:G.year});
  if(G.logs.length>80)G.logs.pop();
  document.getElementById('log-list').innerHTML=G.logs.map(l=>
    `<div class="log-item ${l.type}"><span style="color:var(--text3);font-size:8px">${l.year}·T${l.turn}</span><br>${l.text}</div>`
  ).join('');
}

// ══════════════════════════════════
// END
// ══════════════════════════════════
function endGame(dom=false){
  const ter=playerTer(),d=domPct();
  const score=Math.round((G.mil+G.eco+G.pol+G.res+(G.navy||0))/5+ter*5+G.factCount*8+G.victories*3);
  document.getElementById('end-title').textContent=dom?'🌍 세계 정복 달성!':'전쟁 종결';
  document.getElementById('end-sub').textContent=`${G.year}년 — ${G.nation.name} | ${G.turn-1}턴 | 전쟁 ${G.warCount}회 | 승리 ${G.victories}회`;
  ['mil','eco','pol','res'].forEach(k=>document.getElementById('es-'+k).textContent=G[k]);
  document.getElementById('es-score').textContent=score+'점';
  const ranks=[[200,'🌟 역사의 지배자'],[150,'⚔ 위대한 정복자'],[100,'🏆 강대국'],[70,'🎖 명예로운 종전'],[40,'🛡 생존'],[0,'💀 패배']];
  document.getElementById('es-rank').textContent=ranks.find(r=>score>=r[0])[1]+` | 세계 ${d}%`;
  document.getElementById('end-screen').style.display='flex';
}

// TITLE
// ══════════════════════════════════
function buildTitle(){
  document.getElementById('nation-grid').innerHTML=NATIONS.map(n=>`
    <div class="ncard" onclick="selectN(this,'${n.id}')">
      <div class="ncard-flag">${n.flag}</div>
      <div class="ncard-name">${n.name}</div>
      <div class="ncard-focus">${n.focus}</div>
      <div class="ncard-stats">
        <span class="nstat">군 +${n.bonus.mil}</span><span class="nstat">경 +${n.bonus.eco}</span>
        <span class="nstat">정 +${n.bonus.pol}</span><span class="nstat">연 +${n.bonus.res}</span>
      </div>
    </div>`).join('');
}
function selectN(el,nid){
  document.querySelector('.ncard.sel')?.classList.remove('sel');
  el.classList.add('sel');selNid=nid;
  document.getElementById('start-btn').disabled=false;
}
async function startGame(){
  if(!selNid)return;
  initState(selNid);
  document.getElementById('title').style.display='none';
  document.body.classList.add('game-active');
  document.getElementById('game').style.display='flex';
  renderHUD();renderBars();renderActs();renderTerInfo(null);
  await initMap();
  addLog(`${G.year}년 — ${G.nation.name} 시대 개막. 세계 정복을 향해!`,'event');
}

window.addEventListener('resize',()=>{
  if(!msvg)return;
  const w=document.getElementById('map-wrap').clientWidth;
  const h=document.getElementById('map-wrap').clientHeight;
  msvg.attr('width',w).attr('height',h);
  proj.scale(w/6.3).translate([w/2,h/2]);
  pg=d3.geoPath().projection(proj);
  msvg.select('rect').attr('width',w).attr('height',h);
  drawMap();drawLegend();
});

buildTitle();
</script>
